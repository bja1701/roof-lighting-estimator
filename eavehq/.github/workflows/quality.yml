# EaveHQ quality gate — all steps must pass before merge

name: Quality Gate

on:
  pull_request:
    branches:
      - dev
      - master

jobs:
  quality:
    name: Lint, Type-check, Dead Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome — lint and format check
        run: bunx biome check .

      - name: TypeScript — type check
        run: bunx tsc --noEmit

      - name: Knip — dead code check
        run: bunx knip --production
