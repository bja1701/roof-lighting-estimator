name: Auto PR

on:
  push:
    branches-ignore:
      - dev
      - master

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if none exists
        run: |
          BRANCH="${{ github.ref_name }}"
          EXISTING=$(gh pr list --head "$BRANCH" --base dev --json number -q '.[0].number' 2>/dev/null)
          if [ -z "$EXISTING" ]; then
            TITLE=$(git log -1 --format='%s')
            gh pr create \
              --base dev \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Auto-created PR for \`$BRANCH\`. Codex review will run automatically."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
