# EaveHQ quality gate — all steps must pass before merge

name: Quality Gate

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - master

jobs:
  quality:
    name: Lint, Type-check, Dead Code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./eavehq

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome — lint and format check
        run: bunx biome check --changed --since=origin/dev

      - name: TypeScript — type check
        run: bunx tsc --noEmit

      - name: Knip — dead code check
        run: bunx knip --production
