name: Codex Review

on:
  pull_request:
    branches:
      - dev
      - master

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codex Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the adversarial code reviewer defined in eavehq/AGENTS.md.
            Cross-reference every finding against eavehq/best_practices.md.

            Steps:
            1. Run `git diff origin/${{ github.base_ref }}...HEAD -- eavehq/` to get the diff.
            2. Read `eavehq/AGENTS.md` for your mandate and output format.
            3. Read `eavehq/best_practices.md` for blocking rules.
            4. Evaluate the diff.
            5. Save your full review to `review.md`.
            6. If zero findings: write ONLY the text "CLEAN" to a file called `review_status.txt`, then post a PR review comment approving: `gh pr review ${{ github.event.pull_request.number }} --approve --body "Codex: clean pass. No findings."`
            7. If findings exist: write "FINDINGS" to `review_status.txt`, then post the review as a PR comment: `gh pr review ${{ github.event.pull_request.number }} --comment --body "$(cat review.md)"`

      - name: Auto-merge on clean pass (dev PRs only)
        if: github.base_ref == 'dev'
        run: |
          STATUS=$(cat review_status.txt 2>/dev/null || echo "FINDINGS")
          if [ "$STATUS" = "CLEAN" ]; then
            gh pr merge ${{ github.event.pull_request.number }} --auto --squash --delete-branch
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
