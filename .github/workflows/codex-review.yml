name: Codex Review

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
      - master

jobs:
  codex-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run Codex Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the adversarial code reviewer defined in eavehq/AGENTS.md.
            Cross-reference every finding against eavehq/best_practices.md.

            Steps:
            1. Run `git diff HEAD~1 HEAD -- eavehq/` to get the diff for this push.
               If this is a pull_request event, run `git diff origin/${{ github.base_ref }}...HEAD -- eavehq/` instead.
            2. Read `eavehq/AGENTS.md` for your full mandate and output format.
            3. Read `eavehq/best_practices.md` for the blocking rules.
            4. Write your review following the format in AGENTS.md exactly.
            5. Post the review as a commit comment:
               gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
                 --method POST \
                 -f body="$(cat review.md)"
               Save the review to review.md first, then post it.

            If there are zero findings, post a single-line commit comment: "Codex: clean pass."
